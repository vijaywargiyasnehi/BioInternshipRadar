# BioInternshipRadar — Streamlit secrets template
# Copy this file to .streamlit/secrets.toml and fill in real values.
# secrets.toml is in .gitignore and must NEVER be committed.
#
# On Streamlit Community Cloud, enter these values in:
#   App settings → Secrets

# --------------------------------------------------
# Notifications (optional — leave false to disable)
# --------------------------------------------------
[notifications]
email_enabled = false
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_username = ""
smtp_password = ""
email_from = ""
email_to = ""

telegram_enabled = false
telegram_bot_token = ""
telegram_chat_id = ""

slack_enabled = false
slack_webhook_url = ""

# --------------------------------------------------
# LLM (optional — for resume tailoring assistance)
# --------------------------------------------------
[llm]
provider = "none"      # none | openai | anthropic | local
openai_api_key = ""
anthropic_api_key = ""
