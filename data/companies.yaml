# Target companies for BioInternshipRadar.
#
# platform: greenhouse | lever | ashby | usajobs | workday | icims | company_static | unknown
# board_id: Greenhouse token, Lever slug, or Ashby slug — scanner uses this directly,
#           no career_url needed. Leave blank if unknown.
#
# Confidence notes:
#   (verified)   — confirmed by live API call in prior session
#   (high)       — widely documented / strong prior knowledge
#   (medium)     — plausible based on company profile; verify at boards.greenhouse.io/<board_id>
#   (workday)    — major pharma/med-device companies standardized on Workday; no public API
#   (own-ats)    — uses a proprietary career portal; requires manual monitoring

companies:

  # ---- Federal / Government ----
  # USAJobs scanner automatically searches NIH, FDA, CDC, DoD, and all federal agencies.
  # Requires free API key: https://developer.usajobs.gov  →  set USAJOBS_API_KEY + USAJOBS_EMAIL in .env
  - name: "Federal Agencies (USAJobs)"
    category: Federal / Government
    platform: usajobs
    board_id: ""
    career_url: ""
    internship_url: ""
    network_contact: ""
    priority: High
    active: true
    notes: "Auto-searches USAJobs.gov across NIH, FDA, CDC, BARDA, DoD, and more. Requires USAJOBS_API_KEY in .env."

